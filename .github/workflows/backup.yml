name: Backup Supabase to GitHub

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backup Supabase database
        uses: supabase/db-backup-action@v1
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          output-file: backups/db_$(date +%Y%m%d).sql

      - name: Commit and push backup
        run: |
          git config user.name "backup-bot"
          git config user.email "bot@tmpdrop.app"
          git add backups/
          git diff --staged --quiet || git commit -m "chore: db backup $(date +%Y%m%d)"
          git push
