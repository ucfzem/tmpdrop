<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TmpDrop — Partage temporaire</title>
<meta name="description" content="Partagez des fichiers en toute simplicité. Suppression automatique après 24h.">
<meta property="og:type" content="website">
<meta property="og:title" content="TmpDrop">
<meta property="og:description" content="Partage de fichiers temporaires — 24h auto-destruction">
<style>
:root {
  --bg: #0d0b08;
  --surface: #1a150e;
  --border: rgba(201,168,76,0.15);
  --gold: #c9a84c;
  --gold-dim: #8a7a4a;
  --text: #e8e0d0;
  --text-dim: #8a8270;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem;
}
.container {
  width: 100%;
  max-width: 480px;
}
.logo {
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 0.2rem;
}
.logo span { color: var(--gold); }
.tagline {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 2rem;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 2rem 1rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.3s, background 0.3s;
  position: relative;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--gold);
  background: rgba(201,168,76,0.05);
}
.drop-zone.has-file {
  border-color: var(--gold);
  border-style: solid;
}
.drop-zone input { display: none; }
.drop-icon {
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
  opacity: 0.5;
}
.drop-text { color: var(--text-dim); font-size: 0.9rem; }
.drop-text strong { color: var(--text); }
.file-info {
  display: none;
  align-items: center;
  gap: 0.8rem;
  margin-top: 1rem;
  padding: 0.8rem;
  background: rgba(201,168,76,0.08);
  border-radius: 8px;
}
.file-info.show { display: flex; }
.file-info .name { flex:1; font-size: 0.85rem; word-break: break-all; }
.file-info .size { color: var(--text-dim); font-size: 0.75rem; white-space: nowrap; }
.btn {
  display: block;
  width: 100%;
  padding: 0.9rem;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  text-align: center;
  text-decoration: none;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--gold); color: #0d0b08; }
.btn-primary:hover:not(:disabled) { opacity: 0.9; }
.btn-outline {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
}
.progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(201,168,76,0.15);
  border-radius: 2px;
  margin-top: 1rem;
  overflow: hidden;
  display: none;
}
.progress-bar.show { display: block; }
.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 0.3s;
}
.result {
  display: none;
  margin-top: 1rem;
  padding: 1rem;
  background: rgba(201,168,76,0.08);
  border-radius: 8px;
  text-align: center;
}
.result.show { display: block; }
.result .link {
  display: block;
  color: var(--gold);
  font-size: 0.85rem;
  word-break: break-all;
  margin: 0.5rem 0;
  padding: 0.5rem;
  background: rgba(0,0,0,0.3);
  border-radius: 6px;
  text-decoration: none;
}
.result .hint { color: var(--text-dim); font-size: 0.75rem; margin-top: 0.5rem; }

/* Download page */
.file-card {
  text-align: center;
}
.file-card .icon {
  font-size: 3rem;
  margin-bottom: 1rem;
}
.file-card .fname {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 0.3rem;
}
.file-card .finfo {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 1.5rem;
}
.file-card .expires {
  color: var(--text-dim);
  font-size: 0.75rem;
  margin-top: 1rem;
}
.error-msg {
  color: #e74c3c;
  text-align: center;
  padding: 2rem;
}
.footer {
  margin-top: 2rem;
  text-align: center;
  color: var(--text-dim);
  font-size: 0.75rem;
}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const SUPABASE_URL = 'https://raopfvfwsuooynsqaeaz.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhb3BmdmZ3c3Vvb3luc3FhZWF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMDMxMDIsImV4cCI6MjA5NTU3OTEwMn0.ZJnqtz3O64qmmPdzzwR1N_4LWbvlDHDERvX9PPtidX8';

const params = new URLSearchParams(window.location.search);
const shareId = params.get('d');

if (shareId) {
  showDownloadPage(shareId);
} else {
  showUploadPage();
}

function showUploadPage() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="logo">Tmp<span>Drop</span></div>
    <p class="tagline">Partage temporaire · Auto-suppression 24h</p>
    <div class="card">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput">
        <div class="drop-icon">📁</div>
        <div class="drop-text">Glisse un fichier ici ou <strong>parcours</strong></div>
        <div class="file-info" id="fileInfo">
          <span class="name" id="fileName"></span>
          <span class="size" id="fileSize"></span>
        </div>
      </div>
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      <button class="btn btn-primary" id="uploadBtn" disabled>Uploader</button>
      <div class="result" id="result">
        <div style="margin-bottom:0.5rem;color:var(--gold);font-weight:600;">✅ Fichier partagé !</div>
        <a class="link" id="shareLink" target="_blank"></a>
        <button class="btn btn-outline" id="copyBtn">📋 Copier le lien</button>
        <div class="hint">Ce lien expire dans 24h</div>
      </div>
    </div>
    <div class="card" style="text-align:center;font-size:0.85rem;color:var(--text-dim);">
      <div style="margin-bottom:0.3rem;">📤 Fichiers jusqu'à 50 Mo</div>
      <div>⏳ Supprimés automatiquement après 24h</div>
    </div>
    <div class="footer">TmpDrop · Propulsé par Supabase</div>
  `;
  setupUpload();
}

function setupUpload() {
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const fileName = document.getElementById('fileName');
  const fileSize = document.getElementById('fileSize');
  const uploadBtn = document.getElementById('uploadBtn');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const result = document.getElementById('result');
  const shareLink = document.getElementById('shareLink');
  const copyBtn = document.getElementById('copyBtn');

  let selectedFile = null;

  function selectFile(file) {
    if (!file) return;
    if (file.size > 50 * 1024 * 1024) {
      alert('Fichier trop volumineux. Maximum : 50 Mo.');
      return;
    }
    selectedFile = file;
    fileName.textContent = file.name;
    fileSize.textContent = formatSize(file.size);
    fileInfo.classList.add('show');
    dropZone.classList.add('has-file');
    uploadBtn.disabled = false;
  }

  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) selectFile(e.target.files[0]);
  });
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
  });

  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    uploadBtn.disabled = true;
    uploadBtn.textContent = 'Upload en cours...';
    progressBar.classList.add('show');
    progressFill.style.width = '0%';

    try {
      // 1. Upload file to Supabase Storage
      const fileExt = selectedFile.name.split('.').pop();
      const storagePath = Date.now() + '_' + Math.random().toString(36).slice(2) + '.' + fileExt;
      const uploadRes = await fetch(SUPABASE_URL + '/storage/v1/object/tmp-files/' + storagePath, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + ANON_KEY,
          'Content-Type': selectedFile.type || 'application/octet-stream',
        },
        body: selectedFile,
      });
      if (!uploadRes.ok) throw new Error('Upload échoué');
      progressFill.style.width = '60%';

      // 2. Create DB record
      const shareId = Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 10);
      const fileUrl = SUPABASE_URL + '/storage/v1/object/public/tmp-files/' + storagePath;
      const recordRes = await fetch(SUPABASE_URL + '/rest/v1/uploads', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': ANON_KEY,
          'Authorization': 'Bearer ' + ANON_KEY,
        },
        body: JSON.stringify({
          file_url: fileUrl,
          file_name: selectedFile.name,
          file_size: selectedFile.size,
          mime_type: selectedFile.type || null,
          share_id: shareId,
        }),
      });
      if (!recordRes.ok) throw new Error('Enregistrement échoué');
      progressFill.style.width = '100%';

      // 3. Show result
      const link = window.location.origin + window.location.pathname + '?d=' + shareId;
      shareLink.textContent = link;
      shareLink.href = link;
      result.classList.add('show');
      uploadBtn.style.display = 'none';
      dropZone.style.display = 'none';

      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(link).then(() => {
          copyBtn.textContent = '✅ Copié !';
          setTimeout(() => { copyBtn.textContent = '📋 Copier le lien'; }, 2000);
        });
      });

    } catch (err) {
      alert('Erreur : ' + err.message);
      uploadBtn.disabled = false;
      uploadBtn.textContent = 'Uploader';
      progressBar.classList.remove('show');
    }
  });
}

async function showDownloadPage(id) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="logo">Tmp<span>Drop</span></div><p class="tagline" style="text-align:center;">Récupération...</p>';

  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/uploads?share_id=eq.' + encodeURIComponent(id) + '&select=*', {
      headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY },
    });
    if (!res.ok) throw new Error('Erreur serveur');
    const data = await res.json();

    if (!data || data.length === 0) {
      app.innerHTML = `
        <div class="logo">Tmp<span>Drop</span></div>
        <div class="card error-msg">
          <div style="font-size:3rem;margin-bottom:1rem;">🔗</div>
          <div style="font-weight:600;margin-bottom:0.5rem;">Lien invalide ou expiré</div>
          <div style="font-size:0.85rem;color:var(--text-dim);">Les fichiers sont supprimés après 24h.</div>
          <a href="/" class="btn btn-primary" style="margin-top:1.5rem;">Nouvel upload</a>
        </div>
        <div class="footer">TmpDrop · Propulsé par Supabase</div>
      `;
      return;
    }

    const file = data[0];
    const expires = new Date(file.expires_at);
    const now = new Date();
    const hoursLeft = Math.max(0, Math.floor((expires - now) / 3600000));
    const minutesLeft = Math.max(0, Math.floor(((expires - now) % 3600000) / 60000));

    app.innerHTML = `
      <div class="logo">Tmp<span>Drop</span></div>
      <div class="card file-card">
        <div class="icon">📄</div>
        <div class="fname">${esc(file.file_name)}</div>
        <div class="finfo">${formatSize(file.file_size)}${file.mime_type ? ' · ' + esc(file.mime_type) : ''}</div>
        <a href="${file.file_url}" download="${esc(file.file_name)}" class="btn btn-primary">⬇ Télécharger</a>
        <div class="expires">⏳ Expire dans ${hoursLeft}h ${minutesLeft}min</div>
      </div>
      <div class="card" style="text-align:center;">
        <a href="/" class="btn btn-outline">📤 Partager un fichier</a>
      </div>
      <div class="footer">TmpDrop · Propulsé par Supabase</div>
    `;
  } catch (err) {
    app.innerHTML = `
      <div class="logo">Tmp<span>Drop</span></div>
      <div class="card error-msg">
        <div style="font-size:3rem;margin-bottom:1rem;">⚠️</div>
        <div style="font-weight:600;">Erreur de chargement</div>
        <a href="/" class="btn btn-primary" style="margin-top:1.5rem;">Réessayer</a>
      </div>
      <div class="footer">TmpDrop · Propulsé par Supabase</div>
    `;
  }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' o';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' Ko';
  return (bytes / 1048576).toFixed(1) + ' Mo';
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m];
  });
}
</script>
</body>
</html>
