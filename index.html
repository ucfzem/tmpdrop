<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TmpDrop — Partage de fichiers temporaires gratuit</title>
<meta name="description" content="Partagez des fichiers jusqu'à 50 Mo gratuitement. Suppression automatique après 24h.">
<link rel="canonical" href="https://ucfzem.github.io/tmpdrop/">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ucfzem.github.io/tmpdrop/">
<meta property="og:title" content="TmpDrop — Partage de fichiers temporaires">
<meta property="og:description" content="Partagez des fichiers jusqu'à 50 Mo. Auto-suppression 24h. Gratuit.">
<meta property="og:image" content="https://ucfzem.github.io/tmpdrop/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='28' font-size='28'%3E📤%3C/text%3E%3C/svg%3E">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #0d0b08; color: #e8e0d0;
  min-height: 100vh;
  padding: 1.5rem 1rem;
  display: flex; flex-direction: column; align-items: center;
}
.box {
  width: 100%;
  max-width: 480px;
}
.logo { font-size: 1.8rem; font-weight: 700; text-align: center; margin-bottom: 0.2rem; }
.logo span { color: #c9a84c; }
.tag { color: #8a8270; text-align: center; font-size: 0.85rem; margin-bottom: 1.5rem; }
.card {
  background: #1a150e; border: 1px solid rgba(201,168,76,0.15);
  border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem;
}
.lbl { font-size: 0.85rem; color: #b0a890; margin-bottom: 0.4rem; }
.inp {
  width: 100%; padding: 0.8rem;
  background: rgba(201,168,76,0.06); border: 1px solid var(--b,#2a2518);
  border-radius: 8px; color: #e8e0d0; font-size: 0.95rem;
}
.inp::file-selector-button {
  background: #c9a84c; color: #0d0b08; border: none;
  padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600;
  cursor: pointer; margin-right: 0.8rem;
}
.btn {
  display: block; width: 100%; padding: 0.85rem;
  border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
  cursor: pointer; text-align: center; text-decoration: none;
  min-height: 44px;
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-gold { background: #c9a84c; color: #0d0b08; }
.btn-out { background: transparent; border: 1px solid #c9a84c; color: #c9a84c; }
.hid { display: none; }
.finfo { margin-top: 0.6rem; padding: 0.6rem; background: rgba(201,168,76,0.08); border-radius: 6px; font-size: 0.85rem; }
.prog { width: 100%; height: 4px; background: rgba(201,168,76,0.15); border-radius: 2px; margin-top: 0.8rem; overflow: hidden; }
.prog-fill { height: 100%; width: 0%; background: #c9a84c; border-radius: 2px; transition: width 0.3s; }
.stat { font-size: 0.85rem; margin-top: 0.6rem; text-align: center; }
.link-box {
  display: block; word-break: break-all; padding: 0.5rem;
  background: rgba(0,0,0,0.3); border-radius: 6px; margin: 0.5rem 0;
  color: #c9a84c; text-decoration: none; font-size: 0.85rem;
}
.social { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin-top: 0.6rem; }
.social a {
  display: inline-flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.15);
  color: #c9a84c; text-decoration: none;
}
.ftr { margin-top: 1.5rem; text-align: center; color: #5a5240; font-size: 0.75rem; }
.ftr a { color: #5a5240; }
</style>
</head>
<body>
<div class="box" id="app"></div>
<script>
var SUPABASE_URL = 'https://raopfvfwsuooynsqaeaz.supabase.co';
var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhb3BmdmZ3c3Vvb3luc3FhZWF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMDMxMDIsImV4cCI6MjA5NTU3OTEwMn0.ZJnqtz3O64qmmPdzzwR1N_4LWbvlDHDERvX9PPtidX8';

var params = new URLSearchParams(window.location.search);
var shareId = params.get('d');
var BASE = window.location.pathname.replace(/\/?$/, '/');

if (shareId && shareId.length > 5) {
  loadDownload(shareId);
} else {
  showUpload();
}

function showUpload() {
  document.getElementById('app').innerHTML =
    '<div class="logo">Tmp<span>Drop</span></div>' +
    '<p class="tag">Partage temporaire · Auto-suppression 24h</p>' +
    '<div class="card">' +
      '<div class="lbl">1. Choisis un fichier</div>' +
      '<input type="file" class="inp" id="fi">' +
      '<div id="fi2" class="finfo hid"></div>' +
      '<div id="st" class="stat hid"></div>' +
      '<div class="prog hid" id="pb"><div class="prog-fill" id="pf"></div></div>' +
      '<button class="btn btn-gold" id="ub" disabled style="margin-top:0.8rem">Choisis d\'abord un fichier</button>' +
      '<div id="res" class="hid" style="margin-top:0.8rem">' +
        '<div style="color:#c9a84c;font-weight:600;margin-bottom:0.3rem">✅ Fichier partagé !</div>' +
        '<a class="link-box" id="sl" target="_blank"></a>' +
        '<button class="btn btn-out" id="cb" style="margin-bottom:0.4rem">📋 Copier le lien</button>' +
        '<button class="btn btn-out" id="sb" style="display:none">📤 Partager</button>' +
        '<div class="social" id="soc"></div>' +
        '<div style="font-size:0.75rem;color:#8a8270;margin-top:0.5rem">Ce lien expire dans 24h</div>' +
        '<button class="btn btn-gold" id="nu" style="margin-top:0.8rem">📤 Nouvel upload</button>' +
      '</div>' +
    '</div>' +
    '<div class="card" style="text-align:center;font-size:0.8rem;color:#8a8270">' +
      '<div>📤 Fichiers jusqu\'à 50 Mo · Gratuit</div>' +
      '<div>⏳ Supprimé après 24h</div>' +
    '</div>' +
    '<div class="ftr">TmpDrop · <a href="https://ucfzem.github.io/liens/">ucfzem</a></div>';
  setup();
}

function setup() {
  var fi = document.getElementById('fi');
  var fi2 = document.getElementById('fi2');
  var st = document.getElementById('st');
  var pb = document.getElementById('pb');
  var pf = document.getElementById('pf');
  var ub = document.getElementById('ub');
  var res = document.getElementById('res');
  var sl = document.getElementById('sl');
  var cb = document.getElementById('cb');
  var sb = document.getElementById('sb');
  var soc = document.getElementById('soc');
  var nu = document.getElementById('nu');

  var file = null;

  function msg(t, err) {
    st.textContent = t;
    st.style.display = t ? 'block' : 'none';
    st.style.color = err ? '#e74c3c' : '#8a8270';
  }

  fi.onchange = function() {
    if (!this.files || !this.files.length) return;
    var f = this.files[0];
    file = f;
    fi2.textContent = f.name + ' (' + sz(f.size) + ')';
    fi2.style.display = 'block';
    ub.disabled = false;
    ub.textContent = 'Uploader';
    msg('');
  };

  ub.onclick = async function() {
    if (!file) { msg('Choisis un fichier d\'abord.', true); return; }
    this.disabled = true;
    this.textContent = 'Upload...';
    pb.classList.remove('hid');
    pf.style.width = '0%';
    msg('');

    try {
      var ext = file.name.split('.').pop();
      var path = Date.now() + '_' + Math.random().toString(36).slice(2) + '.' + ext;

      var r1 = await fetch(SUPABASE_URL + '/storage/v1/object/tmp-files/' + path, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + ANON_KEY, 'Content-Type': file.type || 'application/octet-stream' },
        body: file
      });
      if (!r1.ok) throw new Error('Upload fail (code ' + r1.status + ')');
      pf.style.width = '60%';

      var id = Math.random().toString(36).slice(2,10) + Math.random().toString(36).slice(2,10);
      var url = SUPABASE_URL + '/storage/v1/object/public/tmp-files/' + path;
      var r2 = await fetch(SUPABASE_URL + '/rest/v1/uploads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY },
        body: JSON.stringify({ file_url: url, file_name: file.name, file_size: file.size, mime_type: file.type || null, share_id: id })
      });
      if (!r2.ok) throw new Error('DB fail (code ' + r2.status + ')');
      pf.style.width = '100%';

      var link = window.location.origin + BASE + '?d=' + id;
      sl.textContent = link;
      sl.href = link;
      res.classList.remove('hid');
      this.style.display = 'none';
      fi2.style.display = 'none';
      msg('✅ Fichier partagé !');

      cb.onclick = function() {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link).then(function() {
            cb.textContent = '✅ Copié !';
            setTimeout(function(){ cb.textContent = '📋 Copier le lien'; }, 2000);
          });
        } else {
          var r = document.createRange();
          r.selectNodeContents(sl);
          var s = window.getSelection();
          s.removeAllRanges();
          s.addRange(r);
          document.execCommand('copy');
          cb.textContent = '✅ Copié !';
          setTimeout(function(){ cb.textContent = '📋 Copier le lien'; }, 2000);
        }
      };

      sb.style.display = navigator.share ? 'block' : 'none';
      sb.onclick = function() {
        navigator.share({ title: 'TmpDrop', text: 'Fichier sur TmpDrop', url: link });
      };

      var enc = encodeURIComponent(link);
      soc.innerHTML =
        '<a href="https://wa.me/?text=' + enc + '" target="_blank" title="WhatsApp"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></a>' +
        '<a href="https://t.me/share/url?url=' + enc + '&text=TmpDrop" target="_blank" title="Telegram"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M11.944 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0a12 12 0 00-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 01.171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg></a>' +
        '<a href="https://twitter.com/intent/tweet?text=' + enc + '" target="_blank" title="X"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>' +
        '<a href="https://www.facebook.com/sharer/sharer.php?u=' + enc + '" target="_blank" title="Facebook"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></a>' +
        '<a href="https://www.linkedin.com/sharing/share-offsite/?url=' + enc + '" target="_blank" title="LinkedIn"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></a>';

      nu.onclick = function() { showUpload(); };

    } catch (err) {
      msg('Erreur : ' + err.message, true);
      this.disabled = false;
      this.textContent = file ? 'Uploader' : 'Choisis d\'abord un fichier';
      pb.classList.add('hid');
    }
  };
}

function loadDownload(id) {
  var app = document.getElementById('app');
  app.innerHTML = '<div class="logo">Tmp<span>Drop</span></div><p class="tag">Récupération...</p>';

  fetch(SUPABASE_URL + '/rest/v1/uploads?share_id=eq.' + encodeURIComponent(id) + '&select=*', {
    headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY }
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (!data || !data.length) {
      app.innerHTML =
        '<div class="logo">Tmp<span>Drop</span></div>' +
        '<div class="card" style="text-align:center;color:#e74c3c">' +
          '<div style="font-size:2.5rem;margin-bottom:0.5rem">🔗</div>' +
          '<div style="font-weight:600">Lien invalide ou expiré</div>' +
          '<a href="' + BASE + '" class="btn btn-gold" style="margin-top:1rem">Nouvel upload</a>' +
        '</div>' +
        '<div class="ftr">TmpDrop</div>';
      return;
    }
    var f = data[0];
    var ex = new Date(f.expires_at);
    var hr = Math.max(0, Math.floor((ex - Date.now()) / 3600000));
    var mn = Math.max(0, Math.floor(((ex - Date.now()) % 3600000) / 60000));
    app.innerHTML =
      '<div class="logo">Tmp<span>Drop</span></div>' +
      '<div class="card" style="text-align:center">' +
        '<div style="font-size:2.5rem;margin-bottom:0.5rem">📄</div>' +
        '<div style="font-weight:600;word-break:break-word">' + esc(f.file_name) + '</div>' +
        '<div style="color:#8a8270;font-size:0.85rem;margin:0.3rem 0 1rem">' + sz(f.file_size) + '</div>' +
        '<a href="' + f.file_url + '" class="btn btn-gold" download="' + esc(f.file_name) + '">⬇ Télécharger</a>' +
        '<div style="color:#8a8270;font-size:0.75rem;margin-top:0.8rem">⏳ Expire dans ' + hr + 'h ' + mn + 'min</div>' +
      '</div>' +
      '<div class="card" style="text-align:center">' +
        '<a href="' + BASE + '" class="btn btn-out">📤 Partager un fichier</a>' +
      '</div>' +
      '<div class="ftr">TmpDrop</div>';
  }).catch(function() {
    app.innerHTML =
      '<div class="logo">Tmp<span>Drop</span></div>' +
      '<div class="card" style="text-align:center;color:#e74c3c">' +
        '<div style="font-weight:600">Erreur de chargement</div>' +
        '<a href="' + BASE + '" class="btn btn-gold" style="margin-top:1rem">Réessayer</a>' +
      '</div>' +
      '<div class="ftr">TmpDrop</div>';
  });
}

function sz(b) {
  if (b < 1024) return b + ' o';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' Ko';
  return (b / 1048576).toFixed(1) + ' Mo';
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, function(m) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
  });
}
</script>
</body>
</html>
