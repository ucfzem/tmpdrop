<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

<meta name="description" content="Partagez des fichiers jusqu'à 50 Mo gratuitement. Hébergement temporaire, lien de téléchargement, suppression automatique après 24h. Simple, rapide, sans inscription.">

<style>
:root {
  --bg: #0d0b08;
  --surface: #1a150e;
  --border: rgba(201,168,76,0.15);
  --gold: #c9a84c;
  --gold-dim: #8a7a4a;
  --text: #e8e0d0;
  --text-dim: #8a8270;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.container {
  width: 100%;
  max-width: min(92vw, 520px);
}
.logo {
  font-size: clamp(1.5rem, 5vw, 2.5rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 0.15rem;
  text-align: center;
}
.logo span { color: var(--gold); }
.tagline {
  color: var(--text-dim);
  font-size: clamp(0.75rem, 2.5vw, 0.95rem);
  margin-bottom: clamp(1rem, 4vw, 2.5rem);
  text-align: center;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: clamp(1rem, 3vw, 2rem);
  margin-bottom: 1rem;
}
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: clamp(1.5rem, 5vw, 3rem) 1rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.3s, background 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--gold);
  background: rgba(201,168,76,0.05);
}
.drop-zone.has-file {
  border-color: var(--gold);
  border-style: solid;
}
.drop-zone input { display: none; }
.drop-icon {
  font-size: clamp(2rem, 8vw, 3.5rem);
  margin-bottom: 0.5rem;
  opacity: 0.5;
}
.drop-text { color: var(--text-dim); font-size: clamp(0.8rem, 2.5vw, 1rem); }
.drop-text strong { color: var(--text); }
.file-info {
  display: none;
  align-items: center;
  gap: 0.8rem;
  margin-top: 1rem;
  padding: 0.8rem;
  background: rgba(201,168,76,0.08);
  border-radius: 8px;
}
.file-info.show { display: flex; }
.file-info .name { flex:1; font-size: clamp(0.8rem, 2vw, 0.9rem); word-break: break-all; }
.file-info .size { color: var(--text-dim); font-size: clamp(0.7rem, 1.8vw, 0.8rem); white-space: nowrap; }
.btn {
  display: block;
  width: 100%;
  padding: clamp(0.75rem, 2.5vw, 1rem);
  border: none;
  border-radius: 8px;
  font-size: clamp(0.9rem, 2.5vw, 1.1rem);
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  text-align: center;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--gold); color: #0d0b08; }
.btn-primary:hover:not(:disabled) { opacity: 0.9; }
.btn-outline {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
}
.progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(201,168,76,0.15);
  border-radius: 2px;
  margin-top: 1rem;
  overflow: hidden;
  display: none;
}
.progress-bar.show { display: block; }
.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 0.3s;
}
.result {
  display: none;
  margin-top: 1rem;
  padding: clamp(0.8rem, 2vw, 1.2rem);
  background: rgba(201,168,76,0.08);
  border-radius: 8px;
  text-align: center;
}
.result.show { display: block; }
.result .link {
  display: block;
  color: var(--gold);
  font-size: clamp(0.8rem, 2vw, 0.9rem);
  word-break: break-all;
  margin: 0.5rem 0;
  padding: 0.5rem;
  background: rgba(0,0,0,0.3);
  border-radius: 6px;
  text-decoration: none;
}
.result .hint { color: var(--text-dim); font-size: clamp(0.7rem, 1.8vw, 0.8rem); margin-top: 0.5rem; }

/* Download page */
.file-card { text-align: center; }
.file-card .icon { font-size: clamp(2.5rem, 8vw, 4rem); margin-bottom: 1rem; }
.file-card .fname {
  font-size: clamp(1rem, 3vw, 1.3rem);
  font-weight: 600;
  margin-bottom: 0.3rem;
  word-break: break-word;
}
.file-card .finfo {
  color: var(--text-dim);
  font-size: clamp(0.8rem, 2vw, 0.95rem);
  margin-bottom: 1.5rem;
}
.file-card .expires {
  color: var(--text-dim);
  font-size: clamp(0.7rem, 1.8vw, 0.85rem);
  margin-top: 1rem;
}
.error-msg {
  color: #e74c3c;
  text-align: center;
  padding: 2rem;
}
.footer {
  margin-top: 2rem;
  text-align: center;
  color: var(--text-dim);
  font-size: clamp(0.65rem, 1.8vw, 0.8rem);
}

/* TV / large screens */
@media (min-width: 1400px) {
  body { padding: 3rem; }
  .container { max-width: 600px; }
}
@media (min-width: 2000px) {
  body { padding: 4rem; }
  .container { max-width: 700px; }
  .drop-zone { padding: 4rem 2rem; }
}

/* Very small phones */
@media (max-width: 360px) {
  body { padding: 0.6rem; }
  .card { padding: 0.8rem; }
  .drop-zone { padding: 1rem 0.5rem; }
}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const SUPABASE_URL = 'https://raopfvfwsuooynsqaeaz.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhb3BmdmZ3c3Vvb3luc3FhZWF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMDMxMDIsImV4cCI6MjA5NTU3OTEwMn0.ZJnqtz3O64qmmPdzzwR1N_4LWbvlDHDERvX9PPtidX8';

const params = new URLSearchParams(window.location.search);
const shareId = params.get('d');
var BASE = window.location.pathname.replace(/\/?$/, '/');

if (shareId) {
  showDownloadPage(shareId);
} else {
  showUploadPage();
}

function showUploadPage() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="logo">Tmp<span>Drop</span></div>
    <p class="tagline">Partage temporaire · Auto-suppression 24h</p>
    <div class="card">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput">
        <div class="drop-icon">📁</div>
        <div class="drop-text">Glisse un fichier ici ou <strong>parcours</strong></div>
        <div class="file-info" id="fileInfo">
          <span class="name" id="fileName"></span>
          <span class="size" id="fileSize"></span>
        </div>
      </div>
      <div id="statusMsg" style="display:none;font-size:0.85rem;margin-top:0.8rem;text-align:center;"></div>
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      <button class="btn btn-primary" id="uploadBtn" disabled>Sélectionnez un fichier</button>
      <div class="result" id="result">
        <div style="margin-bottom:0.5rem;color:var(--gold);font-weight:600;">✅ Fichier partagé !</div>
        <a class="link" id="shareLink" target="_blank"></a>
        <button class="btn btn-outline" id="copyBtn" style="margin-bottom:0.5rem;">📋 Copier le lien</button>
        <button class="btn btn-outline" id="shareBtn" style="display:none;">📤 Partager</button>
        <div class="hint">Ce lien expire dans 24h</div>
      </div>
    </div>
    <div class="card" style="text-align:center;font-size:0.85rem;color:var(--text-dim);">
      <div style="margin-bottom:0.3rem;">📤 Fichiers jusqu'à 50 Mo</div>
      <div>⏳ Supprimés automatiquement après 24h</div>
    </div>
    <div class="footer">TmpDrop · Propulsé par Supabase</div>
  `;
  setupUpload();
}

function setupUpload() {
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const fileName = document.getElementById('fileName');
  const fileSize = document.getElementById('fileSize');
  const uploadBtn = document.getElementById('uploadBtn');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const result = document.getElementById('result');
  const shareLink = document.getElementById('shareLink');
  const copyBtn = document.getElementById('copyBtn');
  const statusEl = document.getElementById('statusMsg');

  let selectedFile = null;

  function selectFile(file) {
    if (!file) return;
    if (file.size > 50 * 1024 * 1024) {
      setStatus('Fichier trop volumineux. Maximum : 50 Mo.', true);
      return;
    }
    selectedFile = file;
    fileName.textContent = file.name;
    fileSize.textContent = formatSize(file.size);
    fileInfo.classList.add('show');
    dropZone.classList.add('has-file');
    uploadBtn.disabled = false;
    uploadBtn.textContent = 'Uploader';
    setStatus('');
  }

  function setStatus(msg, isError) {
    statusEl.textContent = msg;
    statusEl.style.display = msg ? 'block' : 'none';
    statusEl.style.color = isError ? '#e74c3c' : 'var(--text-dim)';
  }

  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', function(e) {
    if (this.files && this.files.length) selectFile(this.files[0]);
  });
  dropZone.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', function() { this.classList.remove('dragover'); });
  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    this.classList.remove('dragover');
    if (e.dataTransfer && e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
  });

  uploadBtn.addEventListener('click', async function() {
    if (!selectedFile) {
      setStatus('Veuillez sélectionner un fichier d\'abord.', true);
      return;
    }
    this.disabled = true;
    this.textContent = 'Upload en cours...';
    progressBar.classList.add('show');
    progressFill.style.width = '0%';
    setStatus('');

    try {
      var file = selectedFile;
      var fileExt = file.name.split('.').pop();
      var storagePath = String(Date.now()) + '_' + Math.random().toString(36).slice(2) + '.' + fileExt;

      // 1. Upload file to Supabase Storage
      var uploadRes = await fetch(SUPABASE_URL + '/storage/v1/object/tmp-files/' + storagePath, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + ANON_KEY,
          'Content-Type': file.type || 'application/octet-stream',
        },
        body: file,
      });
      if (!uploadRes.ok) throw new Error('Upload échoué (code ' + uploadRes.status + ')');
      progressFill.style.width = '60%';

      // 2. Create DB record
      var shareId = Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 10);
      var fileUrl = SUPABASE_URL + '/storage/v1/object/public/tmp-files/' + storagePath;
      var recordRes = await fetch(SUPABASE_URL + '/rest/v1/uploads', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': ANON_KEY,
          'Authorization': 'Bearer ' + ANON_KEY,
        },
        body: JSON.stringify({
          file_url: fileUrl,
          file_name: file.name,
          file_size: file.size,
          mime_type: file.type || null,
          share_id: shareId,
        }),
      });
      if (!recordRes.ok) {
        var errText = await recordRes.text().catch(function(){ return ''; });
        throw new Error('Enregistrement échoué: ' + errText);
      }
      progressFill.style.width = '100%';

      // 3. Show result
      var link = window.location.origin + BASE + '?d=' + shareId;
      shareLink.textContent = link;
      shareLink.href = link;
      result.classList.add('show');
      this.style.display = 'none';
      fileInfo.style.display = 'none';
      setStatus('✅ Fichier partagé avec succès !');

      copyBtn.onclick = function() {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link).then(function() {
            copyBtn.textContent = '✅ Copié !';
            setTimeout(function(){ copyBtn.textContent = '📋 Copier le lien'; }, 2000);
          });
        } else {
          var range = document.createRange();
          range.selectNodeContents(shareLink);
          var sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          document.execCommand('copy');
          copyBtn.textContent = '✅ Copié !';
          setTimeout(function(){ copyBtn.textContent = '📋 Copier le lien'; }, 2000);
        }
      };
      // Native share (mobile)
      var shareBtn = document.getElementById('shareBtn');
      if (navigator.share) {
        shareBtn.style.display = 'block';
        shareBtn.onclick = function() {
          navigator.share({ title: 'TmpDrop', text: 'Fichier partagé sur TmpDrop', url: link });
        };
      }

    } catch (err) {
      setStatus('Erreur : ' + err.message, true);
      this.disabled = false;
      this.textContent = selectedFile ? 'Uploader' : 'Sélectionnez un fichier';
      progressBar.classList.remove('show');
    }
  });
}

async function showDownloadPage(id) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="logo">Tmp<span>Drop</span></div><p class="tagline" style="text-align:center;">Récupération...</p>';

  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/uploads?share_id=eq.' + encodeURIComponent(id) + '&select=*', {
      headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY },
    });
    if (!res.ok) throw new Error('Erreur serveur');
    const data = await res.json();

    if (!data || data.length === 0) {
      app.innerHTML = `
        <div class="logo">Tmp<span>Drop</span></div>
        <div class="card error-msg">
          <div style="font-size:3rem;margin-bottom:1rem;">🔗</div>
          <div style="font-weight:600;margin-bottom:0.5rem;">Lien invalide ou expiré</div>
          <div style="font-size:0.85rem;color:var(--text-dim);">Les fichiers sont supprimés après 24h.</div>
          <a id="homeLink" href="/" class="btn btn-primary" style="margin-top:1.5rem;">Nouvel upload</a>
        </div>
        <div class="footer">TmpDrop · Propulsé par Supabase</div>
      `;
      return;
    }

    const file = data[0];
    const expires = new Date(file.expires_at);
    const now = new Date();
    const hoursLeft = Math.max(0, Math.floor((expires - now) / 3600000));
    const minutesLeft = Math.max(0, Math.floor(((expires - now) % 3600000) / 60000));

    app.innerHTML = `
      <div class="logo">Tmp<span>Drop</span></div>
      <div class="card file-card">
        <div class="icon">📄</div>
        <div class="fname">${esc(file.file_name)}</div>
        <div class="finfo">${formatSize(file.file_size)}${file.mime_type ? ' · ' + esc(file.mime_type) : ''}</div>
        <a href="${file.file_url}" download="${esc(file.file_name)}" class="btn btn-primary">⬇ Télécharger</a>
        <div class="expires">⏳ Expire dans ${hoursLeft}h ${minutesLeft}min</div>
      </div>
      <div class="card" style="text-align:center;">
        <a href="/" class="btn btn-outline" id="homeLink2">📤 Partager un fichier</a>
      </div>
      <div class="footer">TmpDrop · Propulsé par Supabase</div>
    `;
  } catch (err) {
    app.innerHTML = `
      <div class="logo">Tmp<span>Drop</span></div>
      <div class="card error-msg">
        <div style="font-size:3rem;margin-bottom:1rem;">⚠️</div>
        <div style="font-weight:600;">Erreur de chargement</div>
        <a href="/" class="btn btn-primary" style="margin-top:1.5rem;" id="homeLink3">Réessayer</a>
      </div>
      <div class="footer">TmpDrop · Propulsé par Supabase</div>
    `;
  }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' o';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' Ko';
  return (bytes / 1048576).toFixed(1) + ' Mo';
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m];
  });
}
  // Fix home links for subpath (GitHub Pages)
document.querySelectorAll('[id^=homeLink]').forEach(function(el){ el.href = BASE; });

</script>
</body>
